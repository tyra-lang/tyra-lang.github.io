name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Copy WASM artifacts
        run: |
          mkdir -p public/wasm
          # In CI, wasm artifacts are built by tyra repo CI and published as releases
          # For now, copy from sibling directory if available (local dev)
          if [ -d "../tyra/compiler/crates/tyra-wasm/pkg" ]; then
            cp ../tyra/compiler/crates/tyra-wasm/pkg/tyra_wasm.js public/wasm/
            cp ../tyra/compiler/crates/tyra-wasm/pkg/tyra_wasm_bg.wasm public/wasm/
          fi

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
